<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Monarch Room | Texas Hold'em</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
  <!-- TOP BAR -->
  <header class="topbar">
    <div class="brand">
      <div class="crest"></div>
      <div class="brand-text">
        <h1>Monarch Room</h1>
        <p>Private Texas Hold'em</p>
      </div>
    </div>
    <div class="status-bar">
      <div class="pill"><label>Level</label><strong id="lvl">1</strong></div>
      <div class="pill"><label>Blinds</label><strong id="blinds">25/50</strong></div>
      <div class="pill"><label>Hands</label><strong id="handN">0</strong></div>
      <div class="pill"><label>Phase</label><strong id="phase">—</strong></div>
    </div>
    <div class="util">
      <button class="btn" id="btnSound" type="button" title="Sound" aria-label="Toggle sound">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M11 5 6 9H3v6h3l5 4V5z"/>
          <path d="M15.5 8.5a5 5 0 0 1 0 7"/>
          <path d="M19 5a10 10 0 0 1 0 14"/>
        </svg>
      </button>
      <button class="btn" id="btnSave" type="button" title="Save" aria-label="Save tournament">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
          <path d="M17 21v-8H7v8M7 3v5h8"/>
        </svg>
      </button>
      <button type="button" class="btn-ghost" id="btnNew">New Tournament</button>
    </div>
  </header>

  <!-- MAIN -->
  <div class="main">

    <!-- LEFT PANEL -->
    <aside class="panel">
      <div class="ph"><h2>Ledger</h2><span id="saveLabel">Auto saved</span></div>
      <div class="tabs">
        <button type="button" class="tab on" data-tab="tab-stats">Stats</button>
        <button type="button" class="tab" data-tab="tab-history">History</button>
        <button type="button" class="tab" data-tab="tab-rank">Rank</button>
      </div>
      <div class="tab-body on" id="tab-stats">
        <div class="metrics">
          <div class="metric"><span>Hands Won</span><strong id="sWins">0</strong></div>
          <div class="metric"><span>Showdowns</span><strong id="sShows">0</strong></div>
          <div class="metric"><span>VPIP</span><strong id="sVpip">0%</strong></div>
          <div class="metric"><span>Best Stack</span><strong id="sBest">0</strong></div>
        </div>
        <div class="list" id="aiStats"></div>
      </div>
      <div class="tab-body" id="tab-history">
        <div class="list" id="historyList"></div>
      </div>
      <div class="tab-body" id="tab-rank">
        <div class="list" id="rankList"></div>
      </div>
    </aside>

    <!-- TABLE -->
    <section class="table-wrap">
      <div class="table-felt-logo">MR</div>
      <div class="community" id="community"></div>
      <div class="pot" id="pot"><span>POT</span><strong id="potAmt">0</strong></div>
      <div class="street-label" id="streetLabel"></div>
      <div class="win-overlay" id="winOverlay">
        <div class="win-card">
          <div class="confetti-layer" id="confettiLayer"></div>
          <div class="wlabel">Result</div>
          <span class="wname" id="winName">Monarch Room</span>
          <div class="wdetail" id="winDetail">Welcome. Take your seat.</div>
        </div>
      </div>
      <div id="seats"></div>
    </section>

    <!-- RIGHT PANEL -->
    <aside class="panel">
      <div class="ph"><h2>Command</h2><span id="turnLabel">Waiting</span></div>
      <div class="controls">
        <div class="decision-box">
          <h3 id="decTitle">Ready</h3>
          <p id="decText">A new tournament is about to begin. Good luck.</p>
        </div>
        <div class="slider-block">
          <div class="slider-top"><span>Raise to</span><strong id="raiseDisplay">100</strong></div>
          <input type="range" id="raiseSlider" min="50" max="5000" step="25" value="100">
        </div>
        <div class="action-row">
          <button type="button" class="btn-action" id="btnFold">Fold</button>
          <button type="button" class="btn-action" id="btnCall">Call</button>
          <button type="button" class="btn-primary" id="btnRaise">Raise</button>
        </div>
        <div class="mini-row">
          <button type="button" class="btn-ghost" id="btnCheck">Check</button>
          <button type="button" class="btn-ghost" id="btnAllIn">All In</button>
          <button type="button" class="btn-ghost" id="btnDeal">Deal</button>
        </div>
        <div class="settings">
          <div class="toggle-row">
            <span>Auto-deal next hand</span>
            <button class="sw" id="swAuto" type="button" aria-pressed="false" aria-label="Toggle auto deal"></button>
          </div>
          <div class="toggle-row">
            <span>Show AI cards at showdown</span>
            <button class="sw on" id="swReveal" type="button" aria-pressed="true" aria-label="Toggle AI card reveal"></button>
          </div>
        </div>
        <div class="log" id="log"></div>
      </div>
    </aside>

  </div><!-- /main -->
</div><!-- /app -->

<div class="toast" id="toast"></div>

<script src="app.js" defer></script>
</body>
</html>
