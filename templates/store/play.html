{% extends "base.html" %}
{% load static %}
{% block title %}Playing {{ game.name }} — {{ SITE_NAME }}{% endblock %}

{% block full_page %}
<!DOCTYPE html><!-- play page overrides full layout -->
<div id="toast-root" role="status" aria-live="polite"></div>

<div class="play-page">
  <div class="play-bar">
    <a href="{% url 'game_detail' game.slug %}" style="display:flex;align-items:center;gap:6px;color:var(--t2);font-size:13px;font-weight:500;transition:color .15s;" onmouseover="this.style.color='var(--t1)'" onmouseout="this.style.color='var(--t2)'">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </a>
    <div class="play-bar-title">{{ game.name }}</div>
    <div style="display:flex;gap:8px;align-items:center;">
      <span style="font-size:11px;color:var(--t3);padding:3px 9px;background:var(--fill-1);border-radius:var(--r-full);">{{ game.genre.name }}</span>
      <a href="{% url 'game_detail' game.slug %}" style="padding:5px 14px;background:var(--fill-2);color:var(--t1);border-radius:var(--r-full);font-size:12px;font-weight:600;border:1px solid var(--sep);">Details</a>
      <button onclick="document.querySelector('.play-frame').requestFullscreen&&document.querySelector('.play-frame').requestFullscreen()" style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:var(--fill-1);border-radius:var(--r-md);border:1px solid var(--sep);cursor:pointer;" title="Fullscreen">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
      </button>
    </div>
  </div>
  <iframe class="play-frame" src="{{ game_url }}" title="{{ game.name }}" allow="fullscreen; autoplay" sandbox="allow-scripts allow-same-origin allow-forms allow-pointer-lock"></iframe>
</div>

<link rel="stylesheet" href="{% static 'css/obsidian.css' %}"/>
<script src="{% static 'js/main.js' %}"></script>
{% endblock %}
