<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#44B78B"/>
    </marker>
    <style>
      .box { fill:#161B22; stroke:#30363D; stroke-width:1.5; rx:10; }
      .title { font-family:'Segoe UI', Helvetica, Arial, sans-serif; font-size:15px; fill:#E6EDF3; font-weight:600; }
      .sub { font-family:'Segoe UI', Helvetica, Arial, sans-serif; font-size:12px; fill:#8B949E; }
      .edge { stroke:#44B78B; stroke-width:1.5; fill:none; marker-end:url(#arrow); }
      .tag { font-family:'Segoe UI', Helvetica, Arial, sans-serif; font-size:11px; fill:#44B78B; letter-spacing:1px; }
    </style>
  </defs>

  <rect width="1200" height="420" fill="#0D1117"/>

  <text x="40" y="36" class="tag">DATA FLOW</text>

  <!-- games.ts -->
  <rect x="40" y="60" width="220" height="80" class="box"/>
  <text x="60" y="92" class="title">src/data/games.ts</text>
  <text x="60" y="114" class="sub">Game records: slug, genre,</text>
  <text x="60" y="130" class="sub">thumbnail, repo, play url</text>

  <!-- categories.ts -->
  <rect x="330" y="60" width="220" height="80" class="box"/>
  <text x="350" y="92" class="title">src/lib/categories.ts</text>
  <text x="350" y="114" class="sub">Derives New, Trending,</text>
  <text x="350" y="130" class="sub">Featured, Editors Choice</text>

  <!-- GameGrid -->
  <rect x="620" y="60" width="220" height="80" class="box"/>
  <text x="640" y="92" class="title">GameGrid.tsx</text>
  <text x="640" y="114" class="sub">Lays out cards per</text>
  <text x="640" y="130" class="sub">shelf / genre section</text>

  <!-- GameCard -->
  <rect x="910" y="60" width="220" height="80" class="box"/>
  <text x="930" y="92" class="title">GameCard.tsx</text>
  <text x="930" y="114" class="sub">Cover art, rating,</text>
  <text x="930" y="130" class="sub">wishlist toggle</text>

  <path d="M260 100 H330" class="edge"/>
  <path d="M550 100 H620" class="edge"/>
  <path d="M840 100 H910" class="edge"/>

  <text x="40" y="196" class="tag">PAGES</text>

  <rect x="40" y="220" width="180" height="70" class="box"/>
  <text x="58" y="250" class="title">Home</text>
  <text x="58" y="268" class="sub">Featured shelves</text>

  <rect x="250" y="220" width="180" height="70" class="box"/>
  <text x="268" y="250" class="title">Catalog</text>
  <text x="268" y="268" class="sub">Full library, filters</text>

  <rect x="460" y="220" width="180" height="70" class="box"/>
  <text x="478" y="250" class="title">Genres</text>
  <text x="478" y="268" class="sub">Seven genre shelves</text>

  <rect x="670" y="220" width="180" height="70" class="box"/>
  <text x="688" y="250" class="title">GameDetail</text>
  <text x="688" y="268" class="sub">Single game, related</text>

  <rect x="880" y="220" width="250" height="70" class="box"/>
  <text x="898" y="250" class="title">Account</text>
  <text x="898" y="268" class="sub">Library, wishlist, auth demo</text>

  <path d="M130 140 V220" class="edge"/>
  <path d="M340 140 V220" class="edge"/>
  <path d="M550 140 V220" class="edge"/>
  <path d="M730 140 V220" class="edge"/>
  <path d="M1000 140 V220" class="edge"/>

  <text x="40" y="332" class="tag">DEPLOY</text>

  <rect x="40" y="356" width="260" height="46" class="box"/>
  <text x="58" y="384" class="title">GitHub Actions (deploy.yml)</text>

  <rect x="340" y="356" width="220" height="46" class="box"/>
  <text x="358" y="384" class="title">vite build</text>

  <rect x="600" y="356" width="220" height="46" class="box"/>
  <text x="618" y="384" class="title">GitHub Pages</text>

  <path d="M300 379 H340" class="edge"/>
  <path d="M560 379 H600" class="edge"/>
</svg>
